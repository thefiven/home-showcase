# Default values for the home-showcase chart.
# No sensitive values here: secrets (passwords, Strapi keys...) live in a
# separate Kubernetes Secret created by the operator (see deploy/README.md)
# and referenced via `existingSecret` below.

existingSecret: home-showcase-secrets

postgres:
  image:
    repository: postgres
    tag: "16-bookworm"
  storage: 5Gi
  storageClassName: ""
  # Must match POSTGRES_DB/USER in the referenced Secret.
  database: strapi
  user: strapi

cms:
  image:
    repository: ghcr.io/thefiven/home-showcase-cms
    tag: "1.0.0"
  replicas: 1
  port: 1337
  resources: {}

web:
  image:
    repository: ghcr.io/thefiven/home-showcase-web
    tag: "1.0.0"
  replicas: 1
  port: 3000
  resources: {}

ingress:
  enabled: true
  className: traefik
  host: home-showcase.example.com
  tls:
    enabled: false
    secretName: ""
