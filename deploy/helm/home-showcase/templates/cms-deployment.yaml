apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "home-showcase.fullname" . }}-cms
  labels:
    {{- include "home-showcase.componentLabels" (dict "root" . "component" "cms") | nindent 4 }}
spec:
  replicas: {{ .Values.cms.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: cms
  template:
    metadata:
      labels:
        {{- include "home-showcase.componentLabels" (dict "root" . "component" "cms") | nindent 8 }}
    spec:
      containers:
        - name: cms
          image: "{{ .Values.cms.image.repository }}:{{ .Values.cms.image.tag }}"
          ports:
            - containerPort: {{ .Values.cms.port }}
              name: http
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: {{ .Values.cms.port | quote }}
            # k8s network topology, not a value from the Secret: the
            # postgres Service is resolved by its DNS name in the cluster.
            - name: DATABASE_CLIENT
              value: postgres
            - name: DATABASE_HOST
              value: {{ include "home-showcase.fullname" . }}-postgres
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret }}
          readinessProbe:
            httpGet:
              path: /_health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /_health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.cms.resources | nindent 12 }}
