apiVersion: v1
kind: Service
metadata:
  name: {{ include "home-showcase.fullname" . }}-cms
  labels:
    {{- include "home-showcase.componentLabels" (dict "root" . "component" "cms") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: cms
  ports:
    - port: {{ .Values.cms.port }}
      targetPort: {{ .Values.cms.port }}
      name: http
