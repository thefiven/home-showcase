services:
  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    env_file: ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-strapi}"]
      interval: 5s
      timeout: 5s
      retries: 10

  cms:
    build:
      context: ..
      dockerfile: docker/cms.Dockerfile
      target: dev
    restart: unless-stopped
    env_file: ./.env
    environment:
      HOST: 0.0.0.0
      PORT: "1337"
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "1337:1337"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:1337/_health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
      target: dev
    restart: unless-stopped
    env_file: ./.env
    environment:
      PORT: "3000"
    depends_on:
      cms:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
