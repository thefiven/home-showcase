services:
  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    env_file: ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-strapi}"]
      interval: 5s
      timeout: 5s
      retries: 10

  cms:
    build:
      context: ..
      dockerfile: docker/cms.Dockerfile
      target: dev
    restart: unless-stopped
    env_file: ./.env
    environment:
      HOST: 0.0.0.0
      PORT: "1337"
      # Fixés ici (pas dans docker/.env) : c'est la topologie du réseau Docker
      # (service "postgres") qui l'impose, pas une valeur que l'utilisateur
      # doit pouvoir surcharger. Ces deux clés prennent le pas sur toute
      # valeur du même nom présente dans env_file ci-dessus.
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "1337:1337"
    volumes:
      - ../apps/cms:/app/apps/cms
      - cms_node_modules:/app/apps/cms/node_modules
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:1337/_health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
      target: dev
      args:
        NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    restart: unless-stopped
    env_file: ./.env
    environment:
      PORT: "3000"
    depends_on:
      cms:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ../apps/web:/app/apps/web
      - web_node_modules:/app/apps/web/node_modules

volumes:
  postgres_data:
  cms_node_modules:
  web_node_modules:
