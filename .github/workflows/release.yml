name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        service: [cms, web]
    steps:
      - uses: actions/checkout@v7

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.service }}.Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # NEXT_PUBLIC_* est inliné au build par Next.js (cf. docker/web.Dockerfile,
          # deploy/README.md) : ignoré par cms, sans effet tant que les variables
          # de dépôt ne sont pas renseignées (repli sur les valeurs d'exemple).
          build-args: |
            NEXT_PUBLIC_STRAPI_URL=${{ vars.NEXT_PUBLIC_STRAPI_URL || 'http://localhost:1337' }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL || 'http://localhost:3000' }}

  release:
    needs: images
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: |
            Voir [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) pour le détail de cette version.

            Images publiées :
            - `ghcr.io/${{ github.repository }}-cms:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository }}-web:${{ github.ref_name }}`
