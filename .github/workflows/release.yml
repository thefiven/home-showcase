name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        service: [cms, web]
    steps:
      - uses: actions/checkout@v7

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.service }}.Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # NEXT_PUBLIC_* is inlined at build time by Next.js (see docker/web.Dockerfile,
          # deploy/README.md): ignored by cms, no effect as long as the repository
          # variables aren't set (falls back to the example values).
          build-args: |
            NEXT_PUBLIC_STRAPI_URL=${{ vars.NEXT_PUBLIC_STRAPI_URL || 'http://localhost:1337' }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL || 'http://localhost:3000' }}

  release:
    needs: images
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Resolve the image tag (without the "v" prefix from the git tag)
        id: image-tag
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: false
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for the details of this release.

            Published images:
            - `ghcr.io/${{ github.repository }}-cms:${{ steps.image-tag.outputs.value }}`
            - `ghcr.io/${{ github.repository }}-web:${{ steps.image-tag.outputs.value }}`
