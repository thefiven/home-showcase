name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Audit dépendances
        # continue-on-error : une vuln high transitive existe déjà via
        # apps/cms > @strapi/strapi > vite (GHSA-fx2h-pf6j-xcff), pas
        # corrigeable côté projet — non bloquant tant qu'elle n'est pas
        # patchée en amont par Strapi. À retirer si le seuil doit devenir
        # bloquant une fois résolue.
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - run: pnpm run format:check

      - run: pnpm run lint

      - run: pnpm run test

      - name: Build
        run: pnpm run build
        env:
          # apps/cms (Strapi) needs these to boot even for a build — no real
          # secrets here, sqlite fallback, matches apps/cms/.env.example.
          APP_KEYS: "ci-key-1,ci-key-2"
          API_TOKEN_SALT: "ci-salt"
          ADMIN_JWT_SECRET: "ci-secret"
          TRANSFER_TOKEN_SALT: "ci-salt"
          JWT_SECRET: "ci-secret"
          ENCRYPTION_KEY: "ci-key"
          DATABASE_CLIENT: "sqlite"
          DATABASE_FILENAME: ".tmp/ci-data.db"
          # apps/web builds without a live Strapi backend: fetches fail
          # gracefully (caught, logged), pages just render with no data.
          NEXT_PUBLIC_STRAPI_URL: "http://localhost:1337"
          STRAPI_INTERNAL_URL: "http://localhost:1337"

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright (browsers + deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter e2e exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter e2e exec playwright install-deps chromium

      - name: E2E (Playwright)
        run: pnpm --filter e2e run test:e2e:orchestrated
        env:
          # Stack SQLite jetable démarrée par e2e/run.sh — mêmes secrets
          # factices que le job `ci` (pas de vrai secret requis en CI).
          APP_KEYS: "e2e-key-1,e2e-key-2"
          API_TOKEN_SALT: "e2e-salt"
          ADMIN_JWT_SECRET: "e2e-secret"
          TRANSFER_TOKEN_SALT: "e2e-salt"
          JWT_SECRET: "e2e-secret"
          ENCRYPTION_KEY: "e2e-key"

      - name: Upload rapport Playwright
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
